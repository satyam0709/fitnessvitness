<?xml version="1.0" standalone="no"?>
<svg id="logo-chameleon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 200" width="100%" height="100%">
                        <style>
                            .base-fill { fill: #1a1a1a; }
                            .base-stroke { stroke: #1a1a1a; }
                            /* Dynamic Color Switching */
                            @media (prefers-color-scheme: dark) {
                                .base-fill { fill: #ffffff; }
                                .base-stroke { stroke: #ffffff; }
                            }
                        </style>
                        <!-- Top Green Bar -->
                        <polygon points="20,40 160,40 150,60 30,60" fill="#8bc34a"/>
                        <!-- Outer V Shape -->
                        <polygon points="50,75 120,165 200,40 170,40 120,125 80,75" class="base-fill"/>
                        <!-- Inner Hollow Triangle -->
                        <polygon points="85,75 150,75 120,115" fill="none" class="base-stroke" stroke-width="12" stroke-linejoin="miter"/>

                        <!-- Aggressive Slanted Typography -->
                        <g transform="translate(220, 0) skewX(-10)">
                            <text x="0" y="95" font-family="Impact, Arial Black, sans-serif" font-size="70" fill="#8bc34a" letter-spacing="1">FITNESS</text>
                            <text x="0" y="165" font-family="Impact, Arial Black, sans-serif" font-size="70" class="base-fill" letter-spacing="1">VITNESS</text>
                        </g>
                    </svg>