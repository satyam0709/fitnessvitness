<?xml version="1.0" standalone="no"?>
<svg id="crm-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="100%" height="100%">
                <!-- Calendar Icon Base (Black) -->
                <rect x="10" y="30" width="85" height="70" rx="12" fill="#1a1a2e"/>
                
                <!-- Calendar Rings (Yellow) -->
                <rect x="25" y="15" width="12" height="28" rx="6" fill="#f5c400"/>
                <rect x="47" y="15" width="12" height="28" rx="6" fill="#f5c400"/>
                <rect x="69" y="15" width="12" height="28" rx="6" fill="#f5c400"/>
                
                <!-- Calendar horizontal separator -->
                <path d="M10 55 L95 55" stroke="#f5c400" stroke-width="4"/>
                
                <!-- 365 inside Calendar -->
                <text x="52" y="87" font-family="Arial, sans-serif" font-weight="900" font-size="26" fill="#ffffff" text-anchor="middle" letter-spacing="-1">365</text>

                <!-- Main Text: RND CRM -->
                <!-- Using web-safe Arial Black/Impact style for bold thickness -->
                <text x="110" y="85" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="64" fill="#1a1a2e" letter-spacing="-2">
                    RND <tspan fill="#f5c400">CRM</tspan>
                </text>
                
                <!-- Decorative Graphic (Inspired by the reference rocket/pen strokes) -->
                <path d="M435 85 L475 25 L485 25 L445 85 Z" fill="#1a1a2e"/>
                <path d="M455 85 L495 25 L505 25 L465 85 Z" fill="#f5c400"/>
                <path d="M475 85 L515 25 L520 25 L485 85 Z" fill="#1a1a2e"/>
            </svg>