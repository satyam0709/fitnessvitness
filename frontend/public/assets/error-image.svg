<?xml version="1.0" standalone="no"?>
<svg id="logo-chameleon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="100%" height="100%">
                        <style>
                            .base-fill { fill: #1a1a2e; }
                            .base-stroke { stroke: #1a1a2e; }
                            .inverse-fill { fill: #ffffff; }
                            /* This is the magic code inside the image */
                            @media (prefers-color-scheme: dark) {
                                .base-fill { fill: #ffffff; }
                                .base-stroke { stroke: #ffffff; }
                                .inverse-fill { fill: #121212; }
                            }
                        </style>
                        <!-- Calendar Base -->
                        <rect x="100" y="40" width="120" height="90" rx="14" class="base-fill"/>
                        <!-- Rings -->
                        <rect x="115" y="25" width="12" height="30" rx="6" fill="#f5c400"/>
                        <rect x="154" y="25" width="12" height="30" rx="6" fill="#f5c400"/>
                        <rect x="193" y="25" width="12" height="30" rx="6" fill="#f5c400"/>
                        <!-- Rocket Base -->
                        <g transform="translate(210, 25) rotate(45)">
                            <path d="M8 0 C16 8 16 24 16 32 L0 32 C0 24 0 8 8 0 Z" fill="#f5c400"/>
                            <path d="M0 24 L-8 34 L0 30 Z" fill="#f5c400"/>
                            <path d="M16 24 L24 34 L16 30 Z" fill="#f5c400"/>
                            <circle cx="8" cy="14" r="3.5" class="inverse-fill"/>
                        </g>
                        <!-- Calendar Line -->
                        <line x1="100" y1="72" x2="220" y2="72" stroke="#f5c400" stroke-width="4"/>
                        <!-- 365 Text -->
                        <text x="160" y="112" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="38" class="inverse-fill" text-anchor="middle" letter-spacing="-1">365</text>
                        <!-- 3 Dots -->
                        <circle cx="125" cy="122" r="4.5" fill="#f5c400"/>
                        <circle cx="160" cy="122" r="4.5" fill="#f5c400"/>
                        <circle cx="195" cy="122" r="4.5" fill="#f5c400"/>
                        <!-- RND CRM Text -->
                        <text x="145" y="190" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="48" class="base-fill" text-anchor="middle" letter-spacing="-2">RND <tspan fill="#f5c400">CRM</tspan></text>
                        <!-- Dynamic Pen Swoosh -->
                        <g transform="translate(255, 135)">
                            <path d="M0 55 L22 0 L32 4 L10 60 Z" fill="#f5c400"/>
                            <path d="M25 -5 L45 -25 L36 -1 Z" fill="#f5c400"/>
                            <line x1="10" y1="20" x2="20" y2="24" class="base-stroke" stroke-width="2"/>
                            <line x1="5" y1="35" x2="15" y2="39" class="base-stroke" stroke-width="2"/>
                        </g>
                    </svg>