<?xml version="1.0" standalone="no"?>
<svg id="crm-logo-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="100%" height="100%">
                <!-- Calendar Base (White) -->
                <rect x="10" y="30" width="85" height="70" rx="12" fill="#ffffff"/>
                <!-- Rings (Yellow) -->
                <rect x="25" y="15" width="12" height="28" rx="6" fill="#f5c400"/>
                <rect x="47" y="15" width="12" height="28" rx="6" fill="#f5c400"/>
                <rect x="69" y="15" width="12" height="28" rx="6" fill="#f5c400"/>
                <!-- Separator -->
                <path d="M10 55 L95 55" stroke="#f5c400" stroke-width="4"/>
                <!-- 365 Text (Dark so it shows on white block) -->
                <text x="52" y="87" font-family="Arial, sans-serif" font-weight="900" font-size="26" fill="#121212" text-anchor="middle" letter-spacing="-1">365</text>

                <!-- RND CRM (White & Yellow) -->
                <text x="110" y="85" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="64" fill="#ffffff" letter-spacing="-2">
                    RND <tspan fill="#f5c400">CRM</tspan>
                </text>
                
                <!-- Decoration (White & Yellow) -->
                <path d="M435 85 L475 25 L485 25 L445 85 Z" fill="#ffffff"/>
                <path d="M455 85 L495 25 L505 25 L465 85 Z" fill="#f5c400"/>
                <path d="M475 85 L515 25 L520 25 L485 85 Z" fill="#ffffff"/>
            </svg>